<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="エンジニア1年生向け。git とターミナルの基本コマンドを、1ページ1コマンドの小さなステップでやさしく学べる学習サイトです。">
<title>TermLearn — git &amp; ターミナル 学習チュートリアル</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== App header（共通。浮遊 pill。実在の遷移先のみ：ホーム / 復習リスト） ===== -->
<header class="appbar">
  <a class="logo" href="#/" aria-label="TermLearn ホームへ">
    <span class="logo__mark" aria-hidden="true"></span>
    <span>TermLearn</span>
  </a>
  <nav class="appnav" aria-label="メイン">
    <a id="navHome" href="#/"><span aria-hidden="true" data-icon="home"></span><span>ホーム</span></a>
    <a id="navReview" href="#/review">
      <span aria-hidden="true" data-icon="bookmark"></span>
      <span>復習リスト<span id="reviewBadge" style="display:none;"> (<span id="reviewCount" class="appnav__count">0</span>)</span></span>
    </a>
  </nav>
</header>

<!-- ===== アプリ描画先（ルーターがここに各画面を流し込む） ===== -->
<main id="app" class="page-wrap" aria-live="polite">
  <noscript>
    <p style="padding:24px;">このサイトは JavaScript で動作します。お使いのブラウザで JavaScript を有効にしてください。</p>
  </noscript>
</main>

<footer class="appfoot">
  <span class="appfoot__logo" aria-hidden="true" data-icon="github"></span>
  TermLearn — git &amp; ターミナル学習チュートリアル ・
  <a href="https://github.com" rel="noopener">GitHub</a>
</footer>

<!--
  スクリプトは「依存関係の順」で通常の <script> として読み込む。
  ES Modules（import/export）は使わない:
    → file:// で開いたときに CORS で読めなくなるため。
  各ファイルは window に登録して連携する。
-->
<script src="js/glossary.js"></script>
<script src="js/store.js"></script>
<script src="js/icons.js"></script>
<script src="js/render.js"></script>
<!-- コンテンツ（教材を増やすときはここに1行追加するだけ） -->
<script>window.COURSES = window.COURSES || [];</script>
<script src="content/terminal.js"></script>
<script src="content/git.js"></script>
<script src="content/coming-soon.js"></script>
<!-- ルーター（最後。COURSES が出そろってから起動） -->
<script src="js/router.js"></script>

<!-- ヘッダー/フッターの装飾アイコン・nav 現在地は、icons.js / store.js が出そろってから整える。
     復習件数(reviewBadge/reviewCount)は router.js が route 毎に updateReviewBadge() で最新化する。 -->
<script>
  (function () {
    function fillIcons() {
      if (!window.Icon) return;
      // data-icon="名前" の空スパンに SVG を流し込む（装飾＝aria-hidden は親に付与済み）。
      var slots = document.querySelectorAll('[data-icon]');
      for (var i = 0; i < slots.length; i++) {
        var el = slots[i];
        if (el.getAttribute('data-icon-done')) continue;
        el.innerHTML = window.Icon(el.getAttribute('data-icon'));
        el.setAttribute('data-icon-done', '1');
      }
    }
    function fillLogoMark() {
      // ロゴマーク: 公式ロゴ路線。terminal アイコンを差し込む（装飾＝隣に "TermLearn" 表記あり）。
      var mark = document.querySelector('.logo__mark');
      if (mark && window.Icon && !mark.getAttribute('data-icon-done')) {
        mark.innerHTML = window.Icon('terminal');
        mark.setAttribute('data-icon-done', '1');
      }
    }
    // nav の現在地ハイライト（ホーム系か 復習リストか）。ダミーではなく実在の2遷移先のみ。
    function updateNavCurrent() {
      var h = (window.location.hash || '').replace(/^#/, '');
      var isReview = (h.replace(/^\//, '').split('/')[0] === 'review');
      var home = document.getElementById('navHome');
      var review = document.getElementById('navReview');
      if (home) { home.classList.toggle('is-current', !isReview); home.removeAttribute('aria-current'); if (!isReview) home.setAttribute('aria-current', 'page'); }
      if (review) { review.classList.toggle('is-current', isReview); review.removeAttribute('aria-current'); if (isReview) review.setAttribute('aria-current', 'page'); }
    }
    try { fillLogoMark(); } catch (e) {}
    try { fillIcons(); } catch (e) {}
    try { updateNavCurrent(); } catch (e) {}
    window.addEventListener('hashchange', function () { try { updateNavCurrent(); } catch (e) {} });
  })();
</script>
</body>
</html>
